rank: Wolf
grade: 2nd Grade
url: https://www.scouting.org/programs/cub-scouts/adventures/wolf/
adventure_list:
- name: Bobcat Adventure
  url: https://www.scouting.org/cub-scout-adventures/bobcat-wolf/
  required: true
  alternate_name: Character & Leadership
  requirements:
    - name: bobcat-wolf#1
      description: Get to know the members of your den.
      tags: []
    - name: bobcat-wolf#2
      description: Recite the Scout Oath and the Scout Law with your den and den leader.
      tags: []
    - name: bobcat-wolf#3
      description: Learn about the Scout Law.
      tags: []
    - name: bobcat-wolf#4
      description: With your den create a den Code of Conduct.
      tags: []
    - name: bobcat-wolf#5
      description: Demonstrate the Cub Scout sign, Cub Scout salute and Cub Scout handshake. Show how each is used.
      tags: []
    - name: bobcat-wolf#6
      description: Share with your den, or family, a time when you demonstrated the Cub Scout motto "Do Your Best."
      tags: []
    - name: bobcat-wolf#7
      description: 'At home, with your parent or legal guardian, do the activities in the booklet "How to Protect Your Children from Child Abuse: A Parent’s Guide."'
      tags: [at-home, safety, safety-personal]
- name: Running With the Pack
  url: https://www.scouting.org/cub-scout-adventures/running-with-the-pack/
  required: true
  alternate_name: Personal Fitness
  requirements:
    - name: running-with-the-pack#1
      description: Sample 3 different foods that are naturally 3 different colors. The food must be a protein, vegetable, fruit, dairy, or a grain.
      tags: [food]
    - name: running-with-the-pack#2
      description: Demonstrate the proper way to brush your teeth.
      tags: []
    - name: running-with-the-pack#3
      description: Be active for 30 minutes with your den or at least 1 other person that includes both stretching and moving.
      tags: [be-active]
    - name: running-with-the-pack#4
      description: Be active for 10 minutes doing personal exercises.
      tags: []
    - name: running-with-the-pack#5
      description: Do a relaxing activity for 10 minutes.
      tags: []
    - name: running-with-the-pack#6
      description: Review your Scouting America Annual Health and Medical record with your parent or guardian. Discuss your ability to participate in den and pack activities.
      tags: [first-aid, at-home]
- name: Safety in Numbers
  url: https://www.scouting.org/cub-scout-adventures/safety-in-numbers/
  required: true
  alternate_name: Personal Safety
  requirements:
    - name: safety-in-numbers#1
      description: With permission from your parent or legal guardian, watch the "Protect Yourself Rules" video for the Wolf rank.
      tags: [at-home, safety, safety-personal]
    - name: safety-in-numbers#2
      description: Discuss "safe touch" as seen in the Protect Yourself Rules video.
      tags: [safety, safety-personal]
    - name: safety-in-numbers#3
      description: Learn about the buddy system and demonstrate how it works.
      tags: [buddy-system]
    - name: safety-in-numbers#4
      description: Review common safety rules and demonstrate the proper use of playground equipment.
      tags: [safety]
- name: Footsteps
  url: https://www.scouting.org/cub-scout-adventures/footsteps/
  required: true
  alternate_name: Family & Reverence
  requirements:
    - name: footsteps#1
      description: With your parent or legal guardian talk about your family’s faith traditions. Identify three holidays or celebrations that are part of your family’s faith traditions. Make a craft or work of art of your favorite family’s faith tradition holiday or celebration.
      tags: [art, at-home]
    - name: footsteps#2
      description: With your family, attend a religious service OR other gathering that shows how your family expresses reverence.
      tags: [site-visit, at-home]
    - name: footsteps#3
      description: Carry out an act of kindness.
      tags: []
    - name: footsteps#4
      description: Listen to or read Aesop’s fable "The Boy Who Cried Wolf." With your den or family discuss why being truthful is important.
      tags: []
- name: Council Fire
  url: https://www.scouting.org/cub-scout-adventures/council-fire/
  required: true
  alternate_name: Citizenship
  requirements:
    - name: council-fire#1
      description: Learn how to properly care for and fold the United States flag. With your den or pack, participate in a flag ceremony.
      tags: [flag-etiquette]
    - name: council-fire#2
      description: Identify three points of the Scout Law that are important to being a good neighbor.
      tags: []
    - name: council-fire#3
      description: Build a model of your home.
      tags: []
    - name: council-fire#4
      description: Using the same materials from requirement 3, create a model of a building in your community.
      tags: []
    - name: council-fire#5
      description: Using the models built in requirements 3 and 4, create a neighborhood.
      tags: []
    - name: council-fire#6
      description: Participate in a service project. Explain how your volunteering is helpful to your neighborhood.
      tags: [service-project]
- name: Paws on the Path
  url: https://www.scouting.org/cub-scout-adventures/paws-on-the-path/
  required: true
  alternate_name: Outdoors
  requirements:
    - name: paws-on-the-path#1
      description: Identify the Cub Scout Six Essentials. Show what you do with each item.
      tags: [six-essentials]
    - name: paws-on-the-path#2
      description: Learn about the buddy system and how it works in the outdoors. Pick a buddy for your walk.
      tags: [buddy-system, walk]
    - name: paws-on-the-path#3
      description: Identify appropriate clothes and shoes for your walk outside. Do your best to wear them on your walk.
      tags: []
    - name: paws-on-the-path#4
      description: Learn about the Outdoor Code and Leave No Trace Principle for Kids.
      tags: [outdoor-code]
    - name: paws-on-the-path#5
      description: With your den, pack, or family, take a walk outside for at least 30 minutes to explore nature in your surroundings. Describe four different animals, domestic or wild, that you could see on your walk.
      tags: [six-essentials, walk]
- name: A Wolf Goes Fishing
  stem_nova: [Nova WILD!]
  url: https://www.scouting.org/cub-scout-adventures/a-wolf-goes-fishing/
  required: false
  alternate_name: Fishing
  requirements:
    - name: a-wolf-goes-fishing#1
      description: Identify the type of water you will be fishing in and what type of fish live in the water.
      tags: []
    - name: a-wolf-goes-fishing#2
      description: Learn about the different types of bait used to attract fish.
      tags: []
    - name: a-wolf-goes-fishing#3
      description: Demonstrate a proper cast for the pole or rod you are using.
      tags: []
    - name: a-wolf-goes-fishing#4
      description: Learn the rules of fishing safely.
      tags: [safety, safety-water]
    - name: a-wolf-goes-fishing#5
      description: With your den, pack, or family, go fishing.
      tags: []
- name: Adventures in Coins
  url: https://www.scouting.org/cub-scout-adventures/adventures-in-coins/
  required: false
  stem_nova: [Science is Everywhere]
  requirements:
    - name: adventures-in-coins#1
      description: Identify different parts of a coin.
      tags: []
    - name: adventures-in-coins#2
      description: Find the mint mark on a coin and identify the mint facility where it was made and the year it was made.
      tags: []
    - name: adventures-in-coins#3
      description: Play a coin game.
      tags: [game-indoor, game]
    - name: adventures-in-coins#4
      description: Choose a coin that interests you and make a coin rubbing. List information next to the coin detailing the pictures on it, the year it was made, and the mint where it was made.
      tags: [art]
- name: Air of the Wolf
  url: https://www.scouting.org/cub-scout-adventures/air-of-the-wolf/
  required: false
  stem_nova: [Swing!, 1-2-3 Go!, Fearful Symmetry]
  requirements:
    - name: air-of-the-wolf#1
      description: Make a paper airplane and fly it five times. Record the flight distance and time.
      tags: [stem, science, science-physical]
    - name: air-of-the-wolf#2
      description: Make a paper airplane of a different design and fly it five times. Record the flight distance and time.
      tags: [stem, science, science-physical]
    - name: air-of-the-wolf#3
      description: Compare and contrast the two paper airplanes by distance and flight times.
      tags: [stem, science, science-physical, game]
    - name: air-of-the-wolf#4
      description: Build a flying object that is not a paper airplane.
      tags: [stem, science, science-physical]
- name: Champions for Nature Wolf
  url: https://www.scouting.org/cub-scout-adventures/champions-for-nature-wolf/
  required: false
  alternate_name: Conservation
  stem_nova: [Down and Dirty, Nova WILD!]
  requirements:
    - name: champions-for-nature-wolf#1
      description: Discover the difference between renewable natural resources and non-renewable natural resources.
      tags: [conservation]
    - name: champions-for-nature-wolf#2
      description: 'Learn about the 3 R’s: Reduce, Reuse, Recycle.'
      tags: [conservation]
    - name: champions-for-nature-wolf#3
      description: Discover what happens to the recyclables in your community.
      tags: [conservation]
    - name: champions-for-nature-wolf#4
      description: Participate in a conservation project.
      tags: [conservation,service-project]
- name: Code of the Wolf
  url: https://www.scouting.org/cub-scout-adventures/code-of-the-wolf/
  required: false
  alternate_name: Math
  stem_nova: [Cub Scouts Can Code, 1-2-3 Go!, Fearful Symmetry]
  requirements:
    - name: code-of-the-wolf#1
      description: Create a secret code. Send a message to a member of your den or family. Have that person send a message back to you using the same secret code.
      tags: [codes, stem, mathematics]
    - name: code-of-the-wolf#2
      description: Build and play a game that requires the use of codes or patterns.
      tags: [game-create, game-indoor, codes, stem, mathematics, game]
    - name: code-of-the-wolf#3
      description: Select a single shape. Observe the environment around you. Write down where you see that shape and how it is being used.
      tags: [stem, mathematics]
    - name: code-of-the-wolf#4
      description: Using a package that contains a number of different colored items, discover the most common color.
      tags: [stem, mathematics]
- name: Computing Wolves
  url: https://www.scouting.org/cub-scout-adventures/computing-wolves/
  required: false
  alternate_name: Technology
  stem_nova: [Cub Scouts Can Code, Tech Talk]
  requirements:
    - name: computing-wolves#1
      description: Discover the basic components of a computer.
      tags: [stem, technology]
    - name: computing-wolves#2
      description: Determine how to properly dispose of computer components.
      tags: [stem, technology]
    - name: computing-wolves#3
      description: Using a digital device application of your choice, create a story that you can share with others.
      tags: [stem, technology]
    - name: computing-wolves#4
      description: With your parent or legal guardian, set up a policy for safely using digital devices.
      tags: [stem, technology, at-home]
- name: Cubs Who Care
  url: https://www.scouting.org/cub-scout-adventures/cubs-who-care/
  required: false
  alternate_name: Disabilities Awareness
  requirements:
    - name: cubs-who-care#1
      description: Explore what it is to have a physical disability.
      tags: [inclusion]
    - name: cubs-who-care#2
      description: Explore what it is to have a visual impairment.
      tags: [inclusion]
    - name: cubs-who-care#3
      description: Explore what it is to have a hearing loss.
      tags: [inclusion]
    - name: cubs-who-care#4
      description: Explore barriers to getting around.
      tags: [inclusion]
- name: Digging in the Past
  url: https://www.scouting.org/cub-scout-adventures/digging-in-the-past/
  required: false
  stem_nova: [Science is Everywhere, Down and Dirty, Uncovering the Past, Nova WILD!]
  requirements:
    - name: digging-in-the-past#1
      description: Play a dinosaur game that shows what you know about them.
      tags: [game, stem, science, science-nature]
    - name: digging-in-the-past#2
      description: Create an imaginary dinosaur. Share with your den or family its name, what it eats, its size, and where it lives.
      tags: [stem, science, science-nature]
    - name: digging-in-the-past#3
      description: Be a paleontologist and dig through a dinosaur dig.
      tags: [stem, science, science-nature]
    - name: digging-in-the-past#4
      description: Build a fossil layer.
      tags: [stem, science, science-nature]
- name: Finding Your Way
  url: https://www.scouting.org/cub-scout-adventures/finding-your-way/
  required: false
  stem_nova: [Science is Everywhere, Down and Dirty, Tech Talk, Out of This World, Uncovering the Past]
  requirements:
    - name: finding-your-way#1
      description: Using a map, locate where you live.
      tags: []
    - name: finding-your-way#2
      description: Draw a map for a friend to locate your home or school. Create a key for the map.
      tags: []
    - name: finding-your-way#3
      description: Find the directions north, east, south, and west and the compass rose on a map.
      tags: []
    - name: finding-your-way#4
      description: Find the directions north, east, south, and west using a compass.
      tags: []
    - name: finding-your-way#5
      description: Practice using both a map and a compass.
      tags: []
- name: Germs Alive!
  url: https://www.scouting.org/cub-scout-adventures/germs-alive/
  required: false
  stem_nova: [Science is Everywhere, Out of This World]
  requirements:
    - name: germs-alive#1
      description: Wash your hands with soap and water while singing the "Happy Birthday" song two times.
      tags: [stem, science, science-nature]
    - name: germs-alive#2
      description: Play Germ Magnet with our den or your family. Wash your hands afterward.
      tags: [stem, science, science-nature]
    - name: germs-alive#3
      description: Conduct the sneeze demonstration.
      tags: [stem, science, science-nature]
    - name: germs-alive#4
      description: Conduct the mucus demonstration.
      tags: [stem, science, science-nature]
    - name: germs-alive#5
      description: Grow a mold culture. Show what formed at a den or pack meeting.
      tags: [stem, science, science-nature]
- name: Let’s Camp Wolf
  url: https://www.scouting.org/cub-scout-adventures/lets-camp-wolf/
  required: false
  alternate_name: Camping
  stem_nova: [Out of This World]
  requirements:
    - name: lets-camp-wolf#1
      description: Learn about the buddy system and how it works in the outdoors.
      tags: [buddy-system]
    - name: lets-camp-wolf#2
      description: Know the Cub Scout Six Essentials.
      tags: [six-essentials]
    - name: lets-camp-wolf#3
      description: In addition to your Cub Scout Six Essentials, list the personal items you need for your campout.
      tags: [six-essentials, packing]
    - name: lets-camp-wolf#4
      description: Learn a camping skill.
      tags: [tent, knots]
    - name: lets-camp-wolf#5
      description: Attend a council or district Cub Scout overnight camp or attend a campout with your pack.
      tags: [campout]
- name: Paws for Water
  url: https://www.scouting.org/cub-scout-adventures/paws-for-water/
  required: false
  alternate_name: Swimming
  requirements:
    - name: paws-for-water#1
      description: Learn about the swimming safety rules that you need to follow.
      tags: [safety, safety-water]
    - name: paws-for-water#2
      description: Demonstrate how to enter the swimming area properly.
      tags: []
    - name: paws-for-water#3
      description: Using the buddy system and staying within your ability group, go swimming with your den or family for 30 minutes.
      tags: []
    - name: paws-for-water#4
      description: 'Attempt at least one swimming stroke: front crawl, restful backstroke, or breaststroke.'
      tags: []
    - name: paws-for-water#5
      description: Jump feet first into water that is chest high or deeper.
      tags: []
    - name: paws-for-water#6
      description: Demonstrate how to exit the swimming area properly.
      tags: []
- name: Paws of Skill
  url: https://www.scouting.org/cub-scout-adventures/paws-of-skill/
  required: false
  stem_nova: [Swing!]
  requirements:
    - name: paws-of-skill#1
      description: With your den, discuss sportsmanship and what it means to be a good sport. Make the connection between sportsmanship and the Scout Oath and the Scout Law.
      tags: [sports,sportsmanship, game]
    - name: paws-of-skill#2
      description: Learn the rules of a team sport that you can play with your den, pack, family, or friends. After learning the rules, play the game for 30 minutes.
      tags: [sports, be-active, game, game-team]
    - name: paws-of-skill#3
      description: Visit or watch a team sporting event with your family or den. Look for ways the team works together and share with your family or den.
      tags: [sports, site-visit]
- name: Pedal With the Pack
  url: https://www.scouting.org/cub-scout-adventures/pedal-with-the-pack/
  required: false
  alternate_name: Biking
  requirements:
    - name: pedal-with-the-pack#1
      description: Show how to properly wear a bicycle helmet.Show you can take off and put on without help.
      tags: []
    - name: pedal-with-the-pack#2
      description: Decide what you should wear when riding a bike.
      tags: []
    - name: pedal-with-the-pack#3
      description: Learn about different types of bikes and when/where you might ride these different types.
      tags: []
    - name: pedal-with-the-pack#4
      description: Demonstrate you can start and stop your bicycle without help.
      tags: []
    - name: pedal-with-the-pack#5
      description: Demonstrate proper hand signals.
      tags: []
    - name: pedal-with-the-pack#6
      description: With your den, pack, or family, follow the buddy system and take a bike ride.
      tags: []
- name: Race Time Wolf
  url: https://www.scouting.org/cub-scout-adventures/race-time-wolf/
  required: false
  alternate_name: Race Time
  stem_nova: [Up and Away, 1-2-3 Go!, Fearful Symmetry]
  requirements:
    - name: race-time-wolf#1
      description: With an adult, build either a Pinewood Derby® car or a Raingutter Regatta™ boat.
      tags: []
    - name: race-time-wolf#2
      description: Learn the rules of the race for the vehicle chosen in requirement 1.
      tags: []
    - name: race-time-wolf#3
      description: Identify how you could increase the speed of your chosen vehicle.
      tags: []
    - name: race-time-wolf#4
      description: Before the race, discuss with your den how you will demonstrate good sportsmanship during the race.
      tags: [sportsmanship]
    - name: race-time-wolf#5
      description: Participate in a Pinewood Derby® or a Raingutter Regatta™.
      tags: []
- name: Spirit of the Water
  url: https://www.scouting.org/cub-scout-adventures/spirit-of-the-water/
  required: false
  stem_nova: [Up and Away, Nova WILD!]
  requirements:
    - name: spirit-of-the-water#1
      description: Discover where the water in your home comes from.
      tags: []
    - name: spirit-of-the-water#2
      description: Discuss how water can become polluted.
      tags: [conservation]
    - name: spirit-of-the-water#3
      description: Share some ways you can conserve water in your home.
      tags: [conservation]
    - name: spirit-of-the-water#4
      description: Discover how water in your community is treated to become safe to drink.
      tags: []
- name: Summertime Fun Wolf
  url: https://www.scouting.org/cub-scout-adventures/summertime-fun-wolf/
  required: false
  alternate_name: Summer Time
  requirements:
    - name: summertime-fun-wolf#1
      description: Anytime during May through August participate in a total of three Cub Scout activities.
      tags: []