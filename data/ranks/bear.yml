rank: Bear
grade: 3rd Grade
url: https://www.scouting.org/programs/cub-scouts/adventures/bear/
adventure_list:
- name: Bobcat Adventure
  url: https://www.scouting.org/cub-scout-adventures/bobcat-bear/
  required: true
  alternate_name: Character & Leadership
  requirements:
    - name: bobcat-bear#1
      description: Get to know members of your den.
      tags: []
    - name: bobcat-bear#2
      description: Recite the Scout Oath and Law with your den and den leader.
      tags: []
    - name: bobcat-bear#3
      description: Learn about the Scout Oath. Identify the three points of the Scout Oath.
      tags: []
    - name: bobcat-bear#4
      description: With your den create a den Code of Conduct.
      tags: []
    - name: bobcat-bear#5
      description: Learn about the denner position and responsibilities.
      tags: []
    - name: bobcat-bear#6
      description: Demonstrate the Cub Scout sign, Cub Scout salute, and Cub Scout handshake. Show how each is used.
      tags: []
    - name: bobcat-bear#7
      description: Share with your den, or family, a time when you demonstrated the Cub Scout motto "Do Your Best." Explain why it is important to do your best.
      tags: []
    - name: bobcat-bear#8
      description: 'At home, with your parent or legal guardian do the activities in the booklet "How to Protect Your Children from Child Abuse: A Parent’s Guide."'
      tags: [at-home, safety, safety-personal]
- name: Bear Strong
  url: https://www.scouting.org/cub-scout-adventures/bear-strong/
  required: true
  alternate_name: Personal Fitness
  requirements:
    - name: bear-strong#1
      description: 'Sample food from three of the following food groups: protein, vegetables, fruits, dairy, and grains.'
      tags: [food]
    - name: bear-strong#2
      description: Be active for 30 minutes with your den or at least one other person that includes both stretching and moving.
      tags: [be-active]
    - name: bear-strong#3
      description: Be active for 15 minutes doing personal exercises that include cardio, muscular strength, and flexibility.
      tags: []
    - name: bear-strong#4
      description: Do a relaxing activity for 10 minutes.
      tags: []
    - name: bear-strong#5
      description: Review your Scouting America Annual Health and Medical record with your parent or guardian. Discuss your ability to participate in den and pack activities.
      tags: [first-aid, at-home]
- name: Standing Tall
  url: https://www.scouting.org/cub-scout-adventures/standing-tall/
  required: true
  alternate_name: Personal Safety
  requirements:
    - name: standing-tall#1
      description: With permission from your parent or legal guardian, watch the Protect Yourself Rules video for the Bear rank.
      tags: [at-home, safety, safety-personal]
    - name: standing-tall#2
      description: Complete the Personal Space Bubble worksheet that is part of the Protect Yourself Rules resources.
      tags: [safety, safety-personal]
    - name: standing-tall#3
      description: With your parent or legal guardian, set up a family policy for digital devices.
      tags: [at-home, technology]
    - name: standing-tall#4
      description: Identify common personal safety gear for your head, eyes, mouth, hands, and feet. List how each of these items protect you. Demonstrate the proper use of personal safety gear for an activity.
      tags: [safety]
- name: Fellowship
  url: https://www.scouting.org/cub-scout-adventures/fellowship/
  required: true
  alternate_name: Family & Reverence
  requirements:
    - name: fellowship#1
      description: With your parent or legal guardian talk about your family’s faith traditions. Identify three holidays or celebrations that are part of your family’s faith traditions. Make a craft, work of art, or a food item that is part of your favorite family’s faith tradition, holiday or celebration.
      tags: [art, art-craft, at-home]
    - name: fellowship#2
      description: With your family, attend a religious service OR other gathering that shows how your family expresses reverence.
      tags: [site-visit, at-home]
    - name: fellowship#3
      description: Carry out an act of kindness.
      tags: [inclusion]
    - name: fellowship#4
      description: With your parent or legal guardian identify a religion or faith that is different from your own. Determine two things that it has in common with your family’s beliefs.
      tags: [inclusion]
- name: Paws for Action
  url: https://www.scouting.org/cub-scout-adventures/paws-for-action/
  required: true
  alternate_name: Citizenship
  requirements:
    - name: paws-for-action#1
      description: Familiarize yourself with the flag of the United States of America including the history, demonstrating how to raise and lower the flag, how to properly fold and display, and the United States etiquette.
      tags: [flag-ceremony]
    - name: paws-for-action#2
      description: Identify 3 symbols that represent the United States. Pick your favorite and make a model, work of art, or other craft that depicts the symbol.
      tags: [art, art-craft]
    - name: paws-for-action#3
      description: Learn about the mission of any non-profit. Find out how they fund their activities and how volunteers are used to help.
      tags: []
    - name: paws-for-action#4
      description: Participate in a service project.
      tags: [service-project]
- name: Bear Habitat
  url: https://www.scouting.org/cub-scout-adventures/bear-habitat/
  required: true
  alternate_name: Outdoors
  requirements:
    - name: bear-habitat#1
      description: Prepare for a one-mile walk by gathering the Cub Scout Six Essentials and weather appropriate clothing and shoes.
      tags: [six-essentials, walk, weather, packing]
    - name: bear-habitat#2
      description: '"Know Before You Go" Identify the location of your walk on a map and confirm your one-mile route.'
      tags: [walk, map-compass]
    - name: bear-habitat#3
      description: '"Choose the Right Path" Learn about the path and surrounding area you will be walking on.'
      tags: [walk]
    - name: bear-habitat#4
      description: '"Trash your Trash" Make a plan for what you will do with your personal trash or trash you find along the trail.'
      tags: [walk, outdoor-code]
    - name: bear-habitat#5
      description: '"Leave What You Find" Take pictures along your walk or bring a sketchbook to draw five things that you want to remember on your walk.'
      tags: [walk, outdoor-code]
    - name: bear-habitat#6
      description: '"Be Careful with Fire" Determine the fire danger rating along your path.'
      tags: [safety, safety-fire,outdoor-code]
    - name: bear-habitat#7
      description: '"Respect Wildlife" From a safe distance, identify as you look up, down, and around you, six signs of any mammals, birds, insects, reptiles.'
      tags: [walk, outdoor-code]
    - name: bear-habitat#8
      description: '"Be Kind to Other Visitors" Identify what you need to do as a den to be kind to others on the path.'
      tags: [walk, outdoor-code]
    - name: bear-habitat#9
      description: Go on your one-mile walk while practicing your Leave No Trace Principles for Kids.
      tags: [walk, outdoor-code]

- name: A Bear Goes Fishing
  url: https://www.scouting.org/cub-scout-adventures/a-bear-goes-fishing/
  required: false
  alternate_name: Fishing
  stem_nova: [Science is Everywhere, Swing!, Nova WILD!]
  requirements:
    - name: a-bear-goes-fishing#1
      description: Learn about three types of fish in your area.
      tags: []
    - name: a-bear-goes-fishing#2
      description: Learn about your local fishing regulations with your den leader or an adult.
      tags: []
    - name: a-bear-goes-fishing#3
      description: List three of the regulations you learned about, and one reason each regulation exists.
      tags: []
    - name: a-bear-goes-fishing#4
      description: Become familiar with the safe use of the fishing equipment you will be using on your outing.
      tags: [safety, safety-water]
    - name: a-bear-goes-fishing#5
      description: Learn the proper way to attach the hook, lure, or fly to the line.
      tags: [knots]
    - name: a-bear-goes-fishing#6
      description: Go on a fishing adventure, and for 30 minutes or more, put into practice the things you learned about fish and fishing equipment.
      tags: []
- name: Balancing Bears
  url: https://www.scouting.org/cub-scout-adventures/balancing-bears/
  required: false
  alternate_name: Math
  stem_nova: [1-2-3 Go!, Fearful Symmetry]
  requirements:
    - name: balancing-bears#1
      description: Make trail mix using trail mix math.
      tags: [stem, science, science-nature, food]
    - name: balancing-bears#2
      description: Identify an animal that has a pattern to its physical appearance. Investigate how the animal uses its pattern.
      tags: [stem, science, science-nature]
    - name: balancing-bears#3
      description: Find  examples of bilateral symmetry in nature.
      tags: [stem, science, science-nature]
    - name: balancing-bears#4
      description: Find examples of radial symmetry in nature.
      tags: [stem, science, science-nature]
- name: Baloo the Builder
  url: https://www.scouting.org/cub-scout-adventures/baloo-the-builder/
  required: false
  alternate_name: Engineering
  stem_nova: [Swing!]
  requirements:
    - name: baloo-the-builder#1
      description: Learn about some basic tools and the proper use of each tool. Learn about and understand the need for safety when you work with tools.
      tags: [tools, safety]
    - name: baloo-the-builder#2
      description: Practice using four of the tools you learned about in requirement 1.
      tags: [tools]
    - name: baloo-the-builder#3
      description: Choose a project to build.
      tags: []
    - name: baloo-the-builder#4
      description: Determine the tools and materials needed to build your project in requirement 3.
      tags: [tools]
    - name: baloo-the-builder#5
      description: Build your project.
      tags: []
- name: Bears Afloat
  url: https://www.scouting.org/cub-scout-adventures/bears-afloat/
  required: false
  alternate_name: Paddle Craft
  requirements:
    - name: bears-afloat#1
      description: Before attempting requirements 6 and 7 for this Adventure, you must pass Scouting America swimmer test.
      tags: []
    - name: bears-afloat#2
      description: "Pick a paddle craft you’ll use to complete all requirements: canoe, kayak, or stand-up paddleboard."
      tags: []
    - name: bears-afloat#3
      description: With your den or an adult, discuss the role of qualified adult supervision at a paddle craft activity.
      tags: []
    - name: bears-afloat#4
      description: Explain the safety rules to follow when safely using a paddle craft.
      tags: [safety, safety-water]
    - name: bears-afloat#5
      description: Discover how to tell if a life jacket is the correct size and approved for your paddle craft activity. Demonstrate how to wear it.
      tags: [safety, safety-water]
    - name: bears-afloat#6
      description: Explore how your paddle craft responds as you move your paddle through the water from different places.
      tags: []
    - name: bears-afloat#7
      description: "Have 30 minutes, or more, of canoe, kayak, or stand-up paddleboard paddle time."
      tags: []
- name: Bears on Bikes
  url: https://www.scouting.org/cub-scout-adventures/bears-on-bikes/
