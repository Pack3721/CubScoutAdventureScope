      description: Decide what you should wear when riding a bike.
      tags: []
    - name: bears-on-bikes#3
      description: Demonstrate proper hand signals.
      tags: []
    - name: bears-on-bikes#4
      description: Demonstrate how to adjust saddle height.
      tags: []
    - name: bears-on-bikes#5
      description: Demonstrate how to operate brakes.
      tags: []
