rank: Arrow of Light
grade: 5th Grade
url: https://www.scouting.org/programs/cub-scouts/adventures/arrow-of-light/
adventure_list:
- name: Bobcat Adventure
  url: https://www.scouting.org/cub-scout-adventures/bobcat-arrow-of-light/
  required: true
  alternate_name: Character & Leadership
  requirements:
    - name: bobcat-arrow-of-light#1
      description: Demonstrate the patrol method by choosing a patrol name and electing a patrol leader. Discuss the benefits of using the patrol method.
      tags: []
    - name: bobcat-arrow-of-light#2
      description: Get to know members of your patrol.
      tags: []
    - name: bobcat-arrow-of-light#3
      description: Recite the Scout Oath and Scout Law with your patrol.
      tags: []
    - name: bobcat-arrow-of-light#4
      description: With your patrol create a Code of Conduct.
      tags: []
    - name: bobcat-arrow-of-light#5
      description: Demonstrate the Scout sign, Scout salute and Scout handshake used by Scouting America. Show how each are used.
      tags: []
    - name: bobcat-arrow-of-light#6
      description: Learn the Scouting America slogan and motto.
      tags: []
    - name: bobcat-arrow-of-light#7
      description: With your patrol, or with your parent/legal guardian, visit a Scouting America troop.
      tags: [site-visit, at-home]
    - name: bobcat-arrow-of-light#8
      description: 'At home, with your parent or legal guardian do the activities in the booklet "How to Protect Your Children from Child Abuse: A Parent’s Guide."'
      tags: [at-home,safety]
- name: Personal Fitness
  url: https://www.scouting.org/cub-scout-adventures/personal-fitness/
  required: true
  alternate_name: Personal Fitness
  requirements:
    - name: personal-fitness#1
      description: Plan a balanced meal that you would eat when camping. Prepare that meal using the gear you would use on a campout.
      tags: [meal-planning]
    - name: personal-fitness#2
      description: Examine what it is to be physically fit and how you incorporate this in your life. Track the number of times you are active for 30 minutes or longer over a 14-day period. Share with your patrol or family what you enjoyed and if you feel you are living up to the Scout Oath of being physically strong.
      tags: []
    - name: personal-fitness#3
      description: Be active for 30 minutes with your patrol, a younger den, or at least one other person in a way that includes both stretching and moving.
      tags: [be-active]
    - name: personal-fitness#4
      description: Review your Scouting America Annual Health and Medical Record with your parent or legal guardian. Discuss your ability to participate in Arrow of Light patrol and pack activities.
      tags: [first-aid, at-home]
- name: First Aid
  url: https://www.scouting.org/cub-scout-adventures/first-aid/
  required: true
  alternate_name: Personal Safety
  requirements:
    - name: first-aid#1
      description: With permission from your parent or legal guardian, watch the Protect Yourself Rules video for the Arrow of Light rank.
      tags: [safety,at-home]
    - name: first-aid#2
      description: Explain what you should do if you encounter someone in need of first aid.
      tags: [first-aid]
    - name: first-aid#3
      description: 'Demonstrate what to do for hurry cases of first aid: serious bleeding, heart attack or sudden cardiac arrest, stopped breathing, stroke, poisoning.'
      tags: [first-aid]
    - name: first-aid#4
      description: Demonstrate how to help a choking victim.
      tags: [first-aid]
    - name: first-aid#5
      description: Demonstrate how to treat shock.
      tags: [first-aid]
    - name: first-aid#6
      description: 'Demonstrate how to treat the following: cuts and scratches, burns and scalds, bites and stings of insects and animals, and nosebleed.'
      tags: [first-aid]
    - name: first-aid#7
      description: Make a personal first-aid kit. Demonstrate the proper use of each item in your first-aid kit.
      tags: [first-aid]
- name: Duty to God
  url: https://www.scouting.org/cub-scout-adventures/duty-to-god/
  required: true
  alternate_name: Family & Reverence
  requirements:
    - name: duty-to-god#1
      description: Discuss with your parent or legal guardian your family's faith traditions or one of your choosing. Choose a view or value of that faith tradition that is related to the Scout Law. Discuss with your family how each family member demonstrates this value.
      tags: [at-home]
    - name: duty-to-god#2
      description: Meet with a representative of a faith-based organization in your local community who provides a service that assists people in crisis regardless of their faith. Identify who they help and how.
      tags: [guest-speaker]
    - name: duty-to-god#3
      description: Discuss with your parent, legal guardian, or an adult leader what "Duty to God" means to you. Tell how you practice your Duty to God in your daily life.
      tags: []
- name: Citizenship
  url: https://www.scouting.org/cub-scout-adventures/citizenship/
  required: true
  alternate_name: Citizenship
  requirements:
    - name: citizenship#1
      description: Identify a community service project that your patrol or pack could accomplish. Use Scouting America's SAFE Checklist and develop a plan to conduct the service project safely.
      tags: [service-project]
    - name: citizenship#2
      description: Participate in a service project for a minimum of two hours or multiple service projects for a total of two hours.
      tags: [service-project]
- name: Outdoor Adventurer
  url: https://www.scouting.org/cub-scout-adventures/outdoor-adventurer/
  required: true
  alternate_name: Outdoors
  requirements:
    - name: outdoor-adventurer#1
      description: Learn about the Scout Basic Essentials.
      tags: []
    - name: outdoor-adventurer#2
      description: Determine what you will bring on an overnight campout — including a tent and sleeping bag/gear — and how you will carry your gear.
      tags: [packing]
    - name: outdoor-adventurer#3
      description: Review the four points of Scouting America's SAFE Checklist and how you will apply them on the campout.
      tags: []
    - name: outdoor-adventurer#4
      description: Locate the campsite where you will be camping on a map.
      tags: []
    - name: outdoor-adventurer#5
      description: With your patrol or a Scouting America troop, participate in a campout.
      tags: [campout]
    - name: outdoor-adventurer#6
      description: 'Upon arrival at the campout determine where to set up your campsite: kitchen, eating area, tents, and firepit. Help the patrol set up the patrol gear before setting up your own tent.'
      tags: []
    - name: outdoor-adventurer#7
      description: Explain how to keep food safe and the kitchen area sanitary at the campsite. Demonstrate your knowledge during the campout.
      tags: [food, safety]
    - name: outdoor-adventurer#8
      description: After your campout, discuss with your patrol what went well and what you would do differently next time. Include how you followed the Outdoor Code and Leave No Trace Principles for Kids.
      tags: [outdoor-code]
- name: Champions for Nature AOL
  stem_nova: [Nova WILD!]
  url: https://www.scouting.org/cub-scout-adventures/champions-for-nature-aol/
  required: false
  alternate_name: Conservation
  requirements:
    - name: champions-for-nature-aol#1
      description: Identify foods grown or processed in your state.
      tags: [conservation, food]
    - name: champions-for-nature-aol#2
      description: Determine the benefits of purchasing food that is locally grown or processed.
      tags: [conservation, food]
    - name: champions-for-nature-aol#3
      description: Explore the concept of a food desert.
      tags: [conservation, food]
    - name: champions-for-nature-aol#4
      description: Explore the concept of a food oasis.
      tags: [conservation, food]
    - name: champions-for-nature-aol#5
      description: Learn how individuals can reduce food waste.
      tags: [conservation, food]
    - name: champions-for-nature-aol#6
      description: Participate in a conservation service project.
      tags: [conservation, service-project]
- name: Cycling
  url: https://www.scouting.org/cub-scout-adventures/cycling/
  required: false
  alternate_name: Biking
  requirements:
    - name: cycling#1
      description: Decide on gear and supplies you should bring might bring for a long bike ride. Determine how to safely carry the gear.
      tags: []
    - name: cycling#2
      description: Discover how multi-gear bicycles work and their benefit.
      tags: []
    - name: cycling#3
      description: Show how to lubricate a chain.
      tags: []
    - name: cycling#4
      description: Review different bicycle locks. Demonstrate the operation of locks and, how to secure your bicycle with a lock.
      tags: []
    - name: cycling#5
      description: Repair a flat tire.
      tags: []
    - name: cycling#6
      description: With your patrol, pack, or family, use a map and plan a bicycle ride that is at least 10 miles.
      tags: []
    - name: cycling#7
      description: With your patrol, pack, or family and using the buddy system, go on a bicycle ride that is a minimum of 10 miles.
      tags: []
- name: Engineer
  url: https://www.scouting.org/cub-scout-adventures/engineer/
  required: false
  stem_nova: [Out of This World, Swing!]
  requirements:
    - name: engineer#1
      description: Learn the focus, related sciences, and products of civil, electrical, and mechanical engineers.
      tags: [stem, engineering]
    - name: engineer#2
      description: Pick one of the engineering fields from requirement 1 to complete the following requirements.
      tags: [stem, engineering]
    - name: engineer#3
      description: Examine a set of blueprints or specifications used by your choice of engineer.
      tags: [stem, engineering]
    - name: engineer#4
      description: Identify a project that you would like to build.
      tags: [stem, engineering]
    - name: engineer#5
      description: Using the engineering process, build your project.
      tags: [stem, engineering]
- name: Estimations
  url: https://www.scouting.org/cub-scout-adventures/estimations/
  required: false
  alternate_name: Math
  requirements:
    - name: estimations#1
      description: Estimate food measurements.
      tags: [stem, mathematics, food]
    - name: estimations#2
      description: Estimate the time of day.
      tags: [stem, mathematics]
    - name: estimations#3
      description: Estimate the height of a distant object.
      tags: [stem, mathematics]
    - name: estimations#4
      description: Estimate the distance between two points.
      tags: [stem, mathematics]
- name: Fishing
  url: https://www.scouting.org/cub-scout-adventures/fishing/
  required: false
  alternate_name: Fishing
  requirements:
    - name: fishing#1
      description: Make a plan to go fishing. Determine where you will go and what type of fish you plan to catch.
      tags: []
    - name: fishing#2
      description: Use Scouting America's SAFE Checklist to plan what you need for your fishing experience.
      tags: []
    - name: fishing#3
      description: Describe the environment where the fish might be found.
      tags: []
    - name: fishing#4
      description: Make a list of the equipment and materials you will need to fish.
      tags: []
    - name: fishing#5
      description: Determine the best type of knot to tie your hook to your line and tie it.
      tags: []
    - name: fishing#6
      description: On your own, choose the appropriate type of fishing rod and tackle you will be using. Have an adult review your gear.
      tags: []
    - name: fishing#7
      description: Using what you have learned about fish and fishing equipment, spend at least one hour fishing following local guidelines and regulations.
      tags: []
- name: High Tech Outdoors
  url: https://www.scouting.org/cub-scout-adventures/high-tech-outdoors/
  required: false
  alternate_name: Technology
  requirements:
    - name: high-tech-outdoors#1
      description: With an adult, use a weather app or website to see the forecast for an outdoor activity and discuss any preparation needed to accommodate the weather.
      tags: [stem, technology, weather]
    - name: high-tech-outdoors#2
      description: With an adult, find a knot-tying app. Select one knot to learn, and tie it using the app.
      tags: [stem, technology]
    - name: high-tech-outdoors#3
      description: Discuss how technology has improved camping gear.
      tags: [stem, technology]
    - name: high-tech-outdoors#4
      description: Think of a way technology can improve camping gear used on one of your outdoor activities.
      tags: [stem, technology]
- name: Into the Wild
  url: https://www.scouting.org/cub-scout-adventures/into-the-wild/
  required: false
  stem_nova: [Science is Everywhere, Down and Dirty, Nova WILD!]
  requirements:
    - name: into-the-wild#1
      description: Visit a place with a variety of wild animals. Select one of the animals and observe its behavior. Use your selected animal to complete the remaining requirements.
      tags: [stem, science, science-nature, site-visit]
    - name: into-the-wild#2
      description: Create a model of your animal's ecosystem.
      tags: [stem, science, science-nature]
    - name: into-the-wild#3
      description: Investigate how your animal coexists with other animals in the wild.
      tags: [stem, science, science-nature]
    - name: into-the-wild#4
      description: Describe how humans interact with your chosen animal's ecosystem.
      tags: [stem, science, science-nature]
    - name: into-the-wild#5
      description: Discover how wildlife management benefits your animal.
      tags: [stem, science, science-nature]
- name: Into the Woods
  url: https://www.scouting.org/cub-scout-adventures/into-the-woods/
  required: false
  stem_nova: [Science is Everywhere, Down and Dirty, Out of This World, Nova WILD!]
  requirements:
    - name: into-the-woods#1
      description: Visit an area with trees and plants and conduct a tree inventory. Select one tree and complete the remaining requirements based on that tree.
      tags: [stem, science, science-nature, site-visit]
    - name: into-the-woods#2
      description: Determine if your tree is deciduous or evergreen.
      tags: [stem, science, science-nature]
    - name: into-the-woods#3
      description: Determine if your tree is native or was introduced to your area.
      tags: [stem, science, science-nature]
    - name: into-the-woods#4
      description: Find out how your tree deals with wildfire.
      tags: [stem, science, science-nature, fire-safety]
    - name: into-the-woods#5
      description: Learn how wildlife uses your tree.
      tags: [stem, science, science-nature]
- name: Knife Safety
  url: https://www.scouting.org/cub-scout-adventures/knife-safety/
  required: false
  alternate_name: Knife Skills
  requirements:
    - name: knife-safety#1
      description: Know the safety rules for handling and using a knife.
      tags: [knife]
    - name: knife-safety#2
      description: Demonstrate the knife safety circle.
      tags: [knife]
    - name: knife-safety#3
      description: Demonstrate that you know how to care for and use a knife safely.
      tags: [knife]
    - name: knife-safety#4
      description: Demonstrate the proper use of a pocketknife to make a useful object on a campout.
      tags: [knife]
    - name: knife-safety#5
      description: Choose the correct cooking knife and demonstrate how to properly slice, chop, and mince.
      tags: [knife, food]
- name: Paddle Craft
  url: https://www.scouting.org/cub-scout-adventures/paddle-craft/
  required: false
  alternate_name: Paddle Craft
  requirements:
    - name: paddle-craft#1
      description: Before attempting requirements 5, 6, 7, 8 and 9 for this Adventure, you must pass Scouting America swimmer test.
      tags: []
    - name: paddle-craft#2
      description: 'Pick a paddle craft for which to complete all requirements: canoe, kayak, or stand-up paddleboard.'
      tags: []
    - name: paddle-craft#3
      description: Review Safety Afloat.
      tags: []
    - name: paddle-craft#4
      description: Demonstrate how to choose and properly wear a life jacket that is the correct size.
      tags: []
    - name: paddle-craft#5
      description: Jump feet first into water over your head while wearing a life jacket then swim 25 feet wearing the life jacket.
      tags: []
    - name: paddle-craft#6
      description: Demonstrate how to enter and exit a canoe, kayak, or stand-up paddleboard safely.
      tags: []
    - name: paddle-craft#7
      description: Discuss what to do if your canoe or kayak tips over or you fall off your stand-up paddleboard.
      tags: []
    - name: paddle-craft#8
      description: Learn two paddle strokes, power stroke and sweep.
      tags: []
    - name: paddle-craft#9
      description: With your patrol or family, go on a paddle craft outing.
      tags: []
- name: Race Time AOL
  url: https://www.scouting.org/cub-scout-adventures/race-time-aol/
  required: false
  alternate_name: Race Time
  stem_nova: [Up and Away, 1-2-3 Go!]
  requirements:
    - name: race-time-aol#1
      description: With adult supervision, build either a Pinewood Derby® car or a Raingutter Regatta™ boat.
      tags: []
    - name: race-time-aol#2
      description: Learn the rules of the race for the vehicle chosen in requirement 1.
      tags: []
    - name: race-time-aol#3
      description: Mentor a younger den to prepare for the race.
      tags: []
    - name: race-time-aol#4
      description: Before the race, discuss with your patrol den how you will demonstrate good sportsmanship during the race.
      tags: [sportsmanship]
    - name: race-time-aol#5
      description: Participate in a Pinewood Derby® or a Raingutter Regatta™.
      tags: []
- name: Summertime Fun AOL
  url: https://www.scouting.org/cub-scout-adventures/summertime-fun-aol/
  required: false
  alternate_name: Summer Time
  requirements:
    - name: summertime-fun-aol#1
      description: Anytime during May through August participate in a total of three Cub Scout activities.
      tags: []
- name: Swimming
  url: https://www.scouting.org/cub-scout-adventures/swimming/
  required: false
  alternate_name: Swimming
  requirements:
    - name: swimming#1
      description: Review Safe Swim Defense.
      tags: []
    - name: swimming#2
      description: Explain the meaning of "order of rescue" and demonstrate the reach and throw rescue techniques from land.
      tags: []
    - name: swimming#3
      description: Attempt Scouting America swimmer test.
      tags: []
    - name: swimming#4
      description: Have 30 minutes or more of free swim time during which you practice the buddy system and stay within your ability group. The qualified adult supervision
        should conduct at least three buddy checks per half hour of swimming.
      tags: []