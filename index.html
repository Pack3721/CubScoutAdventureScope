---
---
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cub Scout Adventure Scope</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
	<link rel="stylesheet" href="styles.css?v={{ site.github.build_revision }}">
	<link rel="manifest" href="manifest.json">
	<link rel="icon" href="graphics/icon-192.png" sizes="192x192">
	<link rel="apple-touch-icon" href="graphics/apple-touch-icon.png">
	<meta name="theme-color" content="#3273dc">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="AdventureScope">
</head>

<body>
	<section class="section">
		<div class="container">
			<div class="mb-2">
			</div>
			<div class="is-flex is-align-items-center mb-2" style="gap: 1em;">
				<img src="graphics/icon-192.png" alt="" width="44" height="44" style="border-radius: 0.4em; box-shadow: 0 1px 4px rgba(0,0,0,0.12);">
				<h1 class="title is-2 mb-2 site-title" style="margin-bottom: 0;"><span style="white-space: nowrap;">Cub Scout</span> <span style="white-space: nowrap;">Adventure Scope</span></h1>
				<span id="rank-filter-print-note" class="rank-filter-print-note"></span>
				<span id="qr-code-container" style="display: flex; align-items: center;">
				  <img id="qr-code-img" src="" alt="QR Code" style="height: 38px; width: 38px; margin-left: 0.5em; border-radius: 0.2em; border: 1px solid #eee; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.04);" title="Scan to open this view">
				</span>
			</div>
			   <div class="is-flex is-align-items-center mb-3">
				   <button id="copy-url-btn" class="button is-small is-light" title="Copy link to this view" style="margin-right: 0.5em;">
					   <span class="icon is-small">
						   <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"><path fill="currentColor" d="M17 7h-2V5a3 3 0 0 0-3-3H7a3 3 0 0 0-3 3v7a3 3 0 0 0 3 3h2v2a3 3 0 0 0 3 3h5a3 3 0 0 0 3-3v-7a3 3 0 0 0-3-3Zm-8 6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v2h-2a3 3 0 0 0-3 3v3Zm13 5a1 1 0 0 1-1 1h-5a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v7Z"/></svg>
					   </span>
					   <span class="copy-url-label">Copy URL</span>
				   </button>
				   <button id="clear-btn" class="button is-small is-light" style="margin-left: 0.5em;">Clear</button>
				   <button id="toggle-cloud-btn" class="button is-small is-light" style="margin-left: 0.5em;" title="Show/hide word cloud">
					   <span class="icon is-small">
						   <svg id="toggle-cloud-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"><path fill="currentColor" d="M7.41 18.59L8.83 20 12 16.83 15.17 20l1.41-1.41L12 14l-4.59 4.59zm9.18-13.18L15.17 4 12 7.17 8.83 4 7.41 5.41 12 10l4.59-4.59z"/></svg>
					   </span>
					   <span>Collapse Cloud</span>
				   </button>
				   <div class="dropdown" id="rank-filter-dropdown" style="margin-left: 0.5em;">
					   <div class="dropdown-trigger">
						   <button class="button is-small is-light" id="rank-filter-btn" aria-haspopup="true" aria-controls="rank-filter-menu" title="Choose which ranks to display">
							   <span id="rank-filter-label">Ranks: All</span>
							   <span class="icon is-small">
								   <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24"><path fill="currentColor" d="M7 10l5 5 5-5H7z"/></svg>
							   </span>
						   </button>
					   </div>
					   <div class="dropdown-menu" id="rank-filter-menu" role="menu">
						   <div class="dropdown-content">
							   <label class="dropdown-item rank-filter-item">
								   <input type="checkbox" id="rank-filter-all" checked> All Ranks
							   </label>
							   <hr class="dropdown-divider">
							   <label class="dropdown-item rank-filter-item">
								   <input type="checkbox" class="rank-filter-checkbox" data-rank="Lion"> Lion (K)
							   </label>
							   <label class="dropdown-item rank-filter-item">
								   <input type="checkbox" class="rank-filter-checkbox" data-rank="Tiger"> Tiger (1st)
							   </label>
							   <label class="dropdown-item rank-filter-item">
								   <input type="checkbox" class="rank-filter-checkbox" data-rank="Wolf"> Wolf (2nd)
							   </label>
							   <label class="dropdown-item rank-filter-item">
								   <input type="checkbox" class="rank-filter-checkbox" data-rank="Bear"> Bear (3rd)
							   </label>
							   <label class="dropdown-item rank-filter-item">
								   <input type="checkbox" class="rank-filter-checkbox" data-rank="Webelos"> Webelos (4th)
							   </label>
							   <label class="dropdown-item rank-filter-item">
								   <input type="checkbox" class="rank-filter-checkbox" data-rank="Arrow of Light"> Arrow of Light (5th)
							   </label>
						   </div>
					   </div>
				   </div>
			   </div>
			   <div id="keyword-cloud"></div>

		</div>
	</section>
	<div class="has-text-centered mt-5 mb-3">
		<a href="{{ site.github.repository_url }}" target="_blank" title="View on GitHub"
			style="display: inline-flex; align-items: center;">
			<img src="https://img.shields.io/badge/github-{{ site.github.repository_name }}-blue?logo=github"
				alt="GitHub Repo Badge">
		</a>
	</div>
{% raw %}
	   <script id="cloud-template" type="text/ractive">
				  <div>
					  <div class="mb-4" style="transition: max-height 0.3s;">
						  {{#if !cloudCollapsed}}
							  {{#each visibleCloud:vi}}
								<span class="cloud-tag-wrapper" style="{{visibleCloud[vi].depth ? 'margin-left: ' + (visibleCloud[vi].depth * 1) + 'em;' : ''}}">
									<span class="cloud-keyword {{visibleCloud[vi].type}} {{selectedCloud.includes(cloud[visibleCloud[vi].index]) ? 'selected' : ''}}"
										on-click="toggleCloud"
										data-index="{{visibleCloud[vi].index}}">
									{{#if visibleCloud[vi].type === 'nova'}}
										<span title="STEM Nova">{{visibleCloud[vi].text}} <span style="font-size:1.1em;">💥</span></span>
									{{else}}
										{{visibleCloud[vi].text}}
									{{/if}}
									</span>
									{{#if visibleCloud[vi].hasChildren}}
										<span class="tag-expand-toggle" on-click="toggleTagExpand" data-tag="{{visibleCloud[vi].text}}" title="{{visibleCloud[vi].expanded ? 'Hide' : 'Show'}} sub-tags">{{visibleCloud[vi].expanded ? '−' : '+' + visibleCloud[vi].childCount}}</span>
									{{/if}}
								</span>
							  {{/each}}
						  {{else}}
							  {{#if selectedCloud.length}}
								  {{#each selectedCloud:i}}
									<span class="cloud-keyword {{type}} selected"
										on-click="toggleCloud"
										data-index="{{cloud.indexOf(selectedCloud[i])}}">
									{{#if type === 'nova'}}
										<span title="STEM Nova">{{text}} <span style="font-size:1.1em;">💥</span></span>
									{{else}}
										{{text}}
									{{/if}}
									  </span>
								  {{/each}}
							  {{else}}
								  <span class="has-text-grey">(No items selected)</span>
							  {{/if}}
						  {{/if}}
					  </div>
				   <div id="requirements-grid">
					   {{#if rankOrder.length}}
						   <div class="columns is-multiline">
							   {{#each rankOrder:i}}
								   <div class="column is-one-sixth">
																	 <div class="rank-header" style="background: {{rankStyles[rankOrder[i]].color}}; color: {{rankStyles[rankOrder[i]].text}};">
																			 {{rankOrder[i]}}
																			 {{#if rankGrades && rankGrades[rankOrder[i]]}}
																				 <span class="has-text-weight-normal" style="font-size:0.85em; margin-left:0.3em; opacity:0.85;">({{rankGrades[rankOrder[i]]}})</span>
																			 {{/if}}
																	 </div>
									   {{#each filteredRequirements[rankOrder[i]]:j}}
										   <div class="adventure-group">
											   <div class="adventure-box" style="background: {{rankStyles[rankOrder[i]].bg}};">
												   <div class="adventure-title" style="color: {{rankStyles[rankOrder[i]].color}};">
													   {{name}}
													   {{#if requirements[0].adventureAlt}}
														   <span class="adventure-altname">{{requirements[0].adventureAlt}}</span>
													   {{/if}}
													   {{#if requirements[0].stemNova}}
														   <span class="stem-nova-badge has-tooltip"
															   style="color: #FF6EC7; margin-left: 0.5em; font-size: 1.1em; cursor: pointer; background: none; border-radius: 0; padding: 0; position: relative;"
															   on-click="togglePopover"
															   data-adventure="{{name}}">
															   💥
															   {{#if popoverAdventure === name}}
																   <div class="card popover-stem-nova" style="position: absolute; left: 1.5em; top: 0; z-index: 10; min-width: 180px; max-width: 260px; background: #fff; border: 1px solid #FF6EC7; box-shadow: 0 2px 8px rgba(50,115,220,0.10); border-radius: 0.5em; padding: 0.7em 1em;">
																	   <header class="card-header" style="background: #FF6EC7; color: #fff; border-radius: 0.5em 0.5em 0 0; padding: 0.3em 0.7em; font-size: 1em; font-weight: bold;">
																		   STEM Nova Awards
																	   </header>
																	   <div class="card-content" style="padding: 0.5em 0 0.2em 0;">
																		   <ul style="margin: 0; padding-left: 1.1em;">
																			   {{#each requirements[0].stemNova:n}}
																				   <li style="color: #FF6EC7; font-weight: 500; margin-bottom: 0.3em; line-height: 1.4;">
																					   {{#if novaAwardLinks && novaAwardLinks[requirements[0].stemNova[n].toLowerCase().trim()]}}
																						   <a href="{{novaAwardLinks[requirements[0].stemNova[n].toLowerCase().trim()]}}" target="_blank" style="color: #FF6EC7; text-decoration: underline;">{{requirements[0].stemNova[n]}}</a>
																					   {{else}}
																						   {{requirements[0].stemNova[n]}}
																					   {{/if}}
																				   </li>
																			   {{/each}}
																		   </ul>
																	   </div>
																   </div>
															   {{/if}}
														   </span>
													   {{/if}}
												   </div>
												   <ul>
													   {{#each requirements:i}}
														   <li>
															   <a href="{{adventureUrl}}" target="_blank">{{requirement}}</a>: <span class="requirement-desc">{{description}}</span>
															   {{#if tags.length}}
																   <br>
																   {{#each tags:k}}
																	   <span class="tag is-light" style="margin-right:0.2em;">
																		   {{#if requirements[0].stemNova && requirements[0].stemNova.includes(tags[k])}}
																			   💥 {{tags[k]}}
																		   {{else}}
																			   {{tags[k]}}
																		   {{/if}}
																	   </span>
																   {{/each}}
															   {{/if}}
														   </li>
														   {{#if i < requirements.length - 1}}
															   <hr style="margin: 0.4em 0; border: none; border-top: 1px solid #e3e3e3;">
														   {{/if}}
													   {{/each}}
												   </ul>
											   </div>
										   </div>
									   {{/each}}
								   </div>
							   {{/each}}
						   </div>
					   {{else}}
						   <p class="has-text-grey requirements-empty-message">Select a word cloud item to see matching requirements.</p>
					   {{/if}}
				   </div>
			   </div>
	</script>
{% endraw %}
	 <script src="https://cdn.jsdelivr.net/npm/ractive@1.4.4/ractive.min.js"></script>
	 <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
	 <script src="main.js?v={{ site.github.build_revision }}"></script>


</body>

</html>
